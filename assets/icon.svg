<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" role="img" aria-label="SoundTouch Bridge">
  <!-- App logo: a play triangle bridging into broadcast waves — represents the app
       relaying internet streams to the speaker. Distinct from the speaker-box driver
       icon. Homey recolours icons into a flat single-colour mask, so the mark is built
       from solid fills and round strokes in one colour. -->
  <g fill="none" stroke="#1d1d1f" stroke-width="48" stroke-linecap="round" transform="translate(480 480) scale(1.45) translate(-480 -480)">
    <path fill="#1d1d1f" stroke="none" d="M300 352 L300 608 A26 26 0 0 0 340 630 L520 502 A26 26 0 0 0 520 458 L340 330 A26 26 0 0 0 300 352 Z"/>
    <path d="M560 402 A92 92 0 0 1 560 558"/>
    <path d="M610 326 A182 182 0 0 1 610 634"/>
    <path d="M660 250 A272 272 0 0 1 660 710"/>
  </g>
</svg>
