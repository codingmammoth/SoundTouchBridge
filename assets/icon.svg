    <rect x="370" y="245" width="220" height="36" rx="18" fill="#1a1a1a"/>
    <circle cx="414" cy="263" r="6" fill="#f2f2f2"/>
    <circle cx="462" cy="263" r="6" fill="#5a5a5a"/>
    <circle cx="510" cy="263" r="6" fill="#5a5a5a"/>
    <circle cx="558" cy="263" r="6" fill="#5a5a5a"/>

    <rect x="300" y="360" width="360" height="10" fill="#c8c8c8"/>
