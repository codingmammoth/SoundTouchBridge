    M325 185 H635 A35 35 0 0 1 635 255 H325 A35 35 0 0 1 325 185 Z
    M320 580 a160 160 0 1 0 320 0 a160 160 0 1 0 -320 0 Z
    M445 580 a35 35 0 1 0 70 0 a35 35 0 1 0 -70 0 Z"/>
</svg>
