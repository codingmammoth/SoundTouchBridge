<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      :root {
        color-scheme: light dark;
        --text: #1f2328;
        --muted: #606872;
        --border: #d9dce1;
        --surface: #f8f9fb;
        --primary: #1f2328;
        --primary-text: #ffffff;
      }

      body {
        box-sizing: border-box;
        margin: 0;
        padding: 16px;
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: inherit;
      }

      .status {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.4;
      }

      .list {
        display: grid;
        gap: 8px;
      }

      .speaker {
        width: 100%;
        min-height: 54px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
        text-align: left;
      }

      .speaker strong,
      .speaker span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .speaker span {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }

      .actions button {
        min-height: 40px;
        padding: 8px 12px;
        border: 1px solid var(--primary);
        border-radius: 8px;
        background: var(--primary);
        color: var(--primary-text);
        font: inherit;
        font-weight: 650;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --text: #f3f4f6;
          --muted: #b7bcc4;
          --border: #3a3d43;
          --surface: #191a1d;
          --primary: #f3f4f6;
          --primary-text: #111317;
        }
      }
    </style>
  </head>
  <body>
    <p id="status" class="status">Looking for SoundTouch speakers...</p>
    <div id="list" class="list"></div>
    <div class="actions">
      <button id="retry" type="button">Retry</button>
    </div>

    <script type="application/javascript">
      (function () {
        var statusEl = document.getElementById("status");
        var listEl = document.getElementById("list");
        var retryButton = document.getElementById("retry");
        var SEARCH_TIMEOUT_MS = 15000;

        function setStatus(text) {
          statusEl.textContent = text;
        }

        function emitWithTimeout(eventName, data, timeoutMs) {
          var timeoutPromise = new Promise(function (resolve) {
            setTimeout(function () {
              resolve([]);
            }, timeoutMs);
          });

          return Promise.race([
            Homey.emit(eventName, data || {}),
            timeoutPromise,
          ]);
        }

        function renderDevices(devices) {
          listEl.innerHTML = "";

          if (!devices || devices.length === 0) {
            setStatus("No SoundTouch speakers found. Make sure Homey and the speaker are on the same network, then retry.");
            return;
          }

          setStatus("Select a SoundTouch speaker.");
          devices.forEach(function (device) {
            var button = document.createElement("button");
            var address = device && device.store ? device.store.address : "";
            button.type = "button";
            button.className = "speaker";
            button.innerHTML = "<strong></strong><span></span>";
            button.querySelector("strong").textContent = device.name || "SoundTouch speaker";
            button.querySelector("span").textContent = address || "Local SoundTouch speaker";
            button.addEventListener("click", function () {
              addDevice(device, button);
            });
            listEl.appendChild(button);
          });
        }

        function searchDevices() {
          retryButton.disabled = true;
          listEl.innerHTML = "";
          setStatus("Looking for SoundTouch speakers...");

          emitWithTimeout("list_devices", {}, SEARCH_TIMEOUT_MS)
            .then(function (devices) {
              renderDevices(devices);
            })
            .catch(function (error) {
              setStatus("Could not search for speakers.");
              Homey.alert(error && error.message ? error.message : String(error), "error");
            })
            .then(function () {
              retryButton.disabled = false;
            });
        }

        function addDevice(device, button) {
          button.disabled = true;
          setStatus("Adding " + (device.name || "SoundTouch speaker") + "...");

          Homey.createDevice(device)
            .then(function () {
              return Homey.done();
            })
            .catch(function (error) {
              button.disabled = false;
              setStatus("Could not add speaker.");
              Homey.alert(error && error.message ? error.message : String(error), "error");
            });
        }

        function onHomeyReady(HomeyReady) {
          HomeyReady.setTitle("Add SoundTouch speaker");
          retryButton.addEventListener("click", searchDevices);
          searchDevices();
        }

        window.onHomeyReady = onHomeyReady;
      }());
    </script>
  </body>
</html>
